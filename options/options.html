<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGptMath Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings">
      <h1>ChatGptMath Settings</h1>
      <form id="settings-form">
        <label>
          Provider
          <select id="provider" disabled>
            <option value="openai">OpenAI</option>
          </select>
        </label>

        <label>
          API Key
          <input id="api-key" type="password" placeholder="sk-..." autocomplete="off" />
        </label>

        <label>
          Model
          <select id="model">
            <option value="gpt-4.1-mini">gpt-4.1-mini (default)</option>
            <option value="gpt-4o-mini">gpt-4o-mini</option>
            <option value="gpt-4o">gpt-4o</option>
          </select>
        </label>

        <label>
          Temperature <span id="temperature-value">0.2</span>
          <input id="temperature" type="range" min="0" max="1" step="0.1" value="0.2" />
        </label>

        <label>
          System Prompt (optional)
          <textarea id="system-prompt" rows="4" placeholder="You are a helpful math assistant..."></textarea>
        </label>

        <label>
          TikZ Renderer URL (optional)
          <input id="tikz-renderer-url" type="url" placeholder="https://your-renderer.example.com/render" autocomplete="off" />
        </label>

        <label>
          TikZ Renderer Token (optional)
          <input id="tikz-renderer-token" type="password" placeholder="Bearer token for renderer API" autocomplete="off" />
        </label>

        <button type="submit">Save</button>
        <p id="status" class="status"></p>
      </form>
    </main>
    <script src="options.js" type="module"></script>
  </body>
</html>
